name: ZSE Monitor and Pages

on:
  workflow_dispatch:
    inputs:
      check_type:
        description: "Run mode"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - morning
          - tactical
          - summary
  schedule:
  - cron: "30 7 * * 1-5"   # 09:30 Zagreb ljeti
  - cron: "30 13 * * 1-5"  # 15:30 Zagreb ljeti
  - cron: "0 15 * * 1-5"   # 17:00 Zagreb ljeti

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: zse-monitor-pages
  cancel-in-progress: false

jobs:
  monitor-and-build:
    runs-on: ubuntu-latest
    outputs:
      did_run: ${{ steps.monitor.outputs.did_run }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run ZSE monitor
        id: monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PORTFOLIO_JSON: ${{ secrets.PORTFOLIO_JSON }}
          EXPERT_POSTS_JSON: ${{ secrets.EXPERT_POSTS_JSON }}
          EXPERT_FEED_URLS: ${{ vars.EXPERT_FEED_URLS }}
          DIVIDEND_TICKERS: ${{ vars.DIVIDEND_TICKERS }}
          WOW_TURNOVER_THRESHOLD_EUR: ${{ vars.WOW_TURNOVER_THRESHOLD_EUR || '40000' }}
          WOW_PRICE_CHANGE_THRESHOLD_PCT: ${{ vars.WOW_PRICE_CHANGE_THRESHOLD_PCT || '4' }}
          REQUEST_TIMEOUT_SECONDS: ${{ vars.REQUEST_TIMEOUT_SECONDS || '20' }}
        run: python backend/run_monitor.py --force "${{ inputs.check_type || 'auto' }}"

      - name: Commit generated portfolio data
        if: steps.monitor.outputs.did_run == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update ZSE portfolio data"
          file_pattern: frontend/public/data/portfolio.json

      - name: Set up Node
        if: steps.monitor.outputs.did_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        if: steps.monitor.outputs.did_run == 'true'
        working-directory: frontend
        run: npm install

      - name: Build dashboard
        if: steps.monitor.outputs.did_run == 'true'
        working-directory: frontend
        run: npm run build

      - name: Configure Pages
        if: steps.monitor.outputs.did_run == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.monitor.outputs.did_run == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: monitor-and-build
    if: needs.monitor-and-build.outputs.did_run == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
